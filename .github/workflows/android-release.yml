name: Android Signed Release (Publish to GitHub Releases)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  main_project_module: composeApp
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANONKEY: ${{ secrets.SUPABASE_ANONKEY }}
  GOOGLE_SERVER_ID: ${{ secrets.GOOGLE_SERVER_ID }}

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: sdkmanager "build-tools;34.0.0"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build signed release APK
        run: |
          ./gradlew clean
          ./gradlew :${{ env.main_project_module }}:assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK with version tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          APK_PATH=${{ env.main_project_module }}/build/outputs/apk/release/
          mv "$APK_PATH"/*.apk "$APK_PATH/readlater_${TAG_NAME}.apk"

      - name: Verify renamed APK
        run: ls -lh ${{ env.main_project_module }}/build/outputs/apk/release/

      - name: Upload signed APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.main_project_module }}/build/outputs/apk/release/readlater_*.apk
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
