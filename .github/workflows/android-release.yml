name: Build and Release Android App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANONKEY: ${{ secrets.SUPABASE_ANONKEY }}
      GOOGLE_SERVER_ID: ${{ secrets.GOOGLE_SERVER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Decode Keystore
        run: echo "$KEYSTORE_BASE64" | base64 --decode > my-release-key.jks

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release
        run: |
          ./gradlew :composeApp:assembleRelease
          ./gradlew :composeApp:bundleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: composeApp/build/outputs/apk/release/
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: composeApp/build/outputs/bundle/release/
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Rename outputs
        run: |
          mv composeApp/build/outputs/apk/release/*-signed.apk composeApp-release.apk || true
          mv composeApp/build/outputs/bundle/release/*-signed.aab composeApp-release.aab || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp-release.apk
            composeApp-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
