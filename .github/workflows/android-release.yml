name: Build and Release Android App

on:
  push:
    tags:
      - "v*"    # Example: v1.0.0
  workflow_dispatch:  # Manual trigger option

jobs:
  build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed for GitHub Releases

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANONKEY: ${{ secrets.SUPABASE_ANONKEY }}
      GOOGLE_SERVER_ID: ${{ secrets.GOOGLE_SERVER_ID }}

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 3️⃣ Decode and save the keystore
      - name: Decode Keystore
        run: echo "$KEYSTORE_BASE64" | base64 --decode > my-release-key.jks

      # 4️⃣ Setup Gradle caching
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 5️⃣ Build release APK and AAB from composeApp module
      - name: Build Release
        run: |
          ./gradlew :composeApp:assembleRelease
          ./gradlew :composeApp:bundleRelease

      # 6️⃣ Sign the release APK
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: composeApp/build/outputs/apk/release/
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 7️⃣ Sign the release AAB
      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: composeApp/build/outputs/bundle/release/
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 8️⃣ Rename outputs for clarity
      - name: Rename outputs
        run: |
          mv composeApp/build/outputs/apk/release/*-signed.apk composeApp-release.apk || true
          mv composeApp/build/outputs/bundle/release/*-signed.aab composeApp-release.aab || true

      # 9️⃣ Create a GitHub Release and upload APK + AAB
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp-release.apk
            composeApp-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
