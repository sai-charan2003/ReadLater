name: Build and Create Android Release

on:
  push:
    tags:
      - v*          # Runs when you push a version tag (like v1.0.0)
  workflow_dispatch:  # Allows manual run

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      # 1️⃣ Checkout the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Set up Java (Gradle uses this)
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11   # Use the version required by your project

      # 3️⃣ Setup Gradle cache
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4️⃣ Decode and set up the release keystore
      - name: Prepare Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      # 5️⃣ Build the release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 6️⃣ Create a GitHub Release
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false

      # 7️⃣ Upload APK to the Release
      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/release/app-release.apk
          asset_name: app-release-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive
