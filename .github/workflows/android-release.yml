name: Android Signed Release (GitHub Release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  main_project_module: androidApp
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANONKEY: ${{ secrets.SUPABASE_ANONKEY }}
  GOOGLE_SERVER_ID: ${{ secrets.GOOGLE_SERVER_ID }}

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: sdkmanager "build-tools;34.0.0"

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Remove BuildKonfig flavor
        run: |
          sed -i '/^buildkonfig\.flavor/d' gradle.properties
          grep buildkonfig.flavor gradle.properties || echo "flavor removed"

      # ✅ Build APK
      - name: Build Signed Release APK
        run: |
          ./gradlew clean
          ./gradlew :${{ env.main_project_module }}:assembleRelease \
            -Pbuildkonfig.flavor=release \
            -Dorg.gradle.project.buildkonfig.flavor=release \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # ✅ Build AAB
      - name: Build Signed Release AAB
        run: |
          ./gradlew :${{ env.main_project_module }}:bundleRelease \
            -Pbuildkonfig.flavor=release \
            -Dorg.gradle.project.buildkonfig.flavor=release \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # ✅ Rename APK
      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv ${{ env.main_project_module }}/build/outputs/apk/release/*.apk \
             ${{ env.main_project_module }}/build/outputs/apk/release/readlater_${VERSION}.apk

      # ✅ Rename AAB
      - name: Rename AAB with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv ${{ env.main_project_module }}/build/outputs/bundle/release/*.aab \
             ${{ env.main_project_module }}/build/outputs/bundle/release/readlater_${VERSION}.aab

      # ✅ Verify outputs
      - name: Verify outputs
        run: |
          echo "APK:"
          ls -lh ${{ env.main_project_module }}/build/outputs/apk/release/
          echo "AAB:"
          ls -lh ${{ env.main_project_module }}/build/outputs/bundle/release/

      # ✅ Upload AAB to Actions (NOT release)
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-release
          path: ${{ env.main_project_module }}/build/outputs/bundle/release/readlater_${{ github.ref_name }}.aab

      # ✅ Upload ONLY APK to GitHub Release
      - name: Upload Signed APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: ${{ env.main_project_module }}/build/outputs/apk/release/readlater_${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}