name: Android Signed Release (Upload to GitHub Releases)

on:
  push:
    tags:
      - 'v*' # Runs when you push a version tag, e.g., v1.0.0
  workflow_dispatch:

env:
  main_project_module: app
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANONKEY: ${{ secrets.SUPABASE_ANONKEY }}
  GOOGLE_SERVER_ID: ${{ secrets.GOOGLE_SERVER_ID }}

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 🧰 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install required build tools
        run: sdkmanager "build-tools;34.0.0"

      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: ⚙️ Build Signed Release APK
        run: |
          ./gradlew clean
          ./gradlew :${{ env.main_project_module }}:assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 🔍 Verify APK
        run: ls -lh ${{ env.main_project_module }}/build/outputs/apk/release/

      - name: 📤 Upload Signed APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.main_project_module }}/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
