name: Build and Release Android App

on:
  push:
    tags:
      - "v*"    # Runs when a version tag like v1.0.0 is pushed
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed for GitHub Releases

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANONKEY: ${{ secrets.SUPABASE_ANONKEY }}
      GOOGLE_SERVER_ID: ${{ secrets.GOOGLE_SERVER_ID }}

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 3️⃣ Decode and save the keystore
      - name: Decode Keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > my-release-key.jks

      # 4️⃣ Setup Gradle caching
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 5️⃣ Build the release APK & AAB
      - name: Build Release
        run: |
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      # 6️⃣ Sign the release builds
      - name: Sign APK and AAB
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 7️⃣ Rename outputs for clarity
      - name: Rename outputs
        run: |
          mv app/build/outputs/apk/release/app-release-signed.apk app-release.apk || true
          mv app/build/outputs/bundle/release/app-release-signed.aab app-release.aab || true

      # 8️⃣ Create GitHub Release and upload artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
